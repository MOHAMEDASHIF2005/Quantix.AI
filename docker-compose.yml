version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./quantix.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - backend_data:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:

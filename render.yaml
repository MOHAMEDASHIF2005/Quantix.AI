services:
  - type: web
    name: quantix-ai-backend-ashif
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    rootDir: backend
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: Quantix AI
      - key: DATABASE_URL
        value: sqlite:///./quantix.db
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: CORS_ORIGINS
        value: "https://quantix-ai-ashif.surge.sh,http://localhost:5173,http://localhost:3000"
      - key: GEMINI_API_KEY
        sync: false
